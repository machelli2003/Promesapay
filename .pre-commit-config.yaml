# Pre-commit configuration for PromesaPay
# Automatically runs linting and formatting before commits

# Install pre-commit: pip install pre-commit
# Setup hooks: pre-commit install
# Bypass hooks: git commit --no-verify

repos:
  # Python: General linting and code quality
  - repo: https://github.com/PyCQA/flake8
    rev: "7.0.0"
    hooks:
      - id: flake8
        args: ["--max-line-length=100", "--extend-ignore=E203,W503"]
        language_version: python3.11

  # Python: Auto-formatting
  - repo: https://github.com/psf/black
    rev: "24.1.1"
    hooks:
      - id: black
        language_version: python3.11
        args: ["--line-length=100"]

  # Python: Import sorting
  - repo: https://github.com/PyCQA/isort
    rev: "5.13.2"
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=100"]

  # Python: Type checking (optional, slower)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.8.0"
    hooks:
      - id: mypy
        additional_dependencies: ["types-all"]
        args: ["--ignore-missing-imports"]
        exclude: "^tests/"

  # YAML validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v4.5.0"
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key

  # JavaScript/Node: Prettier for formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.1.1"
    hooks:
      - id: prettier
        types_or: [javascript, jsx, typescript, tsx, markdown, json, yaml]
        exclude: "^(node_modules/|dist/|build/)"

  # JavaScript: ESLint (if configured)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: "v8.56.0"
    hooks:
      - id: eslint
        files: \.(js|jsx|ts|tsx)$
        exclude: "^(node_modules/|dist/|build/)"
        additional_dependencies:
          - eslint
          - eslint-config-prettier
          - eslint-plugin-react
          - eslint-plugin-react-hooks

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: "v0.37.0"
    hooks:
      - id: markdownlint
        args: ["--fix"]
        exclude: "^node_modules/"

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: "v1.4.0"
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Git diff checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v4.5.0"
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements

# Exclude certain patterns from all hooks
exclude: |
  (?x)^(
    venv/|
    .venv/|
    env/|
    node_modules/|
    dist/|
    build/|
    \.eggs/|
    .*\.egg-info/|
    __pycache__/|
    \.pytest_cache/|
    flask_session/
  )

# Global file exclusions
files: |
  (?!^\.env)

# Fail fast (stop on first failure)
fail_fast: false

# Verbose output
verbose: true
