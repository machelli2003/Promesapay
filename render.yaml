services:
  - type: web
    name: promesapay
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm ci && npm run build
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: FRONTEND_URL
        value: https://promesapay.onrender.com
      - key: BACKEND_URL
        value: https://promesapay.onrender.com
      - key: CORS_ORIGINS
        value: https://promesapay.onrender.com
      - key: GOOGLE_CALLBACK_URL
        value: https://promesapay.onrender.com/api/auth/google/callback
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false